# ============================================================
# RealGuard — Docker Compose — Full System Orchestration
# ============================================================
# Usage:
#   docker compose up --build          (full system)
#   docker compose up zookeeper kafka redis mlflow -d  (infra only — Phase 1)
# ============================================================

version: "3.9"

services:
  # --------------------------------------------------------
  # Zookeeper — required by Kafka
  # --------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: realguard-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # Kafka — event streaming backbone
  # --------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: realguard-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------
  # Redis — real-time feature store
  # --------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: realguard-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # MLflow — experiment tracking & model registry
  # --------------------------------------------------------
  mlflow:
    image: python:3.11-slim
    container_name: realguard-mlflow
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
                 --host 0.0.0.0
                 --port 5000
                 --backend-store-uri sqlite:///mlflow/mlflow.db
                 --default-artifact-root /mlflow/artifacts"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # --------------------------------------------------------
  # Prometheus — metrics collection
  # --------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: realguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"

  # --------------------------------------------------------
  # Grafana — live monitoring dashboard
  # --------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.1
    container_name: realguard-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # --------------------------------------------------------
  # FastAPI — inference API (built from Dockerfile.api)
  # --------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: realguard-api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKER: kafka:9092
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started

  # --------------------------------------------------------
  # Faust streaming processor (built from Dockerfile.streaming)
  # --------------------------------------------------------
  streaming:
    build:
      context: .
      dockerfile: Dockerfile.streaming
    container_name: realguard-streaming
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKER: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  redis_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
